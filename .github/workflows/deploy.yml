name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Production Deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"book-log","project":"${{ secrets.VERCEL_PROJECT_ID }}","target":"production","gitSource":{"type":"github","org":"zer0-kr","repo":"book-log","ref":"main"}}' \
            "https://api.vercel.com/v13/deployments" | head -c 200
